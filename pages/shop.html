<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyStore</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/light-theme.css" id="theme-link" />
    <link rel="stylesheet" href="../css/shop-style.css" />
  </head>
  <body>
    
    <header id="navbar"></header>

    
    <main id="products-wrapper">
      <div id="top-bar">
        <input type="text" id="search-bar" placeholder="Search products..." />
        <div id="view-buttons">
          <button class="toggle-view-btn" id="grid-btn" onclick="toggleView()">
            Grid
          </button>
          <button class="toggle-view-btn" id="list-btn" onclick="toggleView()">
            List
          </button>
        </div>
      </div>

      <div id="shop-layout">
        <div id="category-list">
          <h5>Categories</h5>
          <ul>
            <li class="active" onclick="changeCategory('all')">All</li>
            <li onclick="changeCategory('laptops')">Laptops</li>
            <li onclick="changeCategory('controllers')">Controllers</li>
            <li onclick="changeCategory('cameras')">Cameras</li>
            <li onclick="changeCategory('computer accessories')">
              Computer Accessories
            </li>
            <li onclick="changeCategory('phones')">Phones</li>
            <li onclick="changeCategory('earbuds')">Earbuds</li>
            <li onclick="changeCategory('phone accessories')">
              Phone Accessories
            </li>
          </ul>
        </div>

        <div id="products-grid" class="view-grid">
          
        </div>
      </div>

      <p id="no-results" class="hidden">No products found.</p>

      <div id="page-buttons">
        <button id="prev-btn" onclick="changePage(-1)">&#8592; Prev</button>
        <span id="page-indicator"></span>
        <button id="next-btn" onclick="changePage(1)">Next &#8594;</button>
      </div>
    </main>

    
    <footer id="footer"></footer>
    <script src="../js/main.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/search.js"></script>
  </body>
</html>
