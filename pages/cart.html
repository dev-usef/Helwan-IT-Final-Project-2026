<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyStore</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/light-theme.css" id="theme-link" />
    <link rel="stylesheet" href="../css/cart.css" />
  </head>
  <body>
    <header id="navbar"></header>

    <section class="checkout">
      <form class="myform">
        <div class="container">
          <div class="ordersummary">
            <h1>order summary</h1>

            <div id="items">
              <div id="items-list"></div>
              <div class="bottom_summary">
                <div class="shop_table">
                  <p>subtotal :</p>
                  <span class="subtotal_checkout">$</span>
                </div>

                <div class="shop_table">
                  <p>shipping :</p>
                  <span class="shipping_price">0$</span>
                </div>

                <div class="shop_table">
                  <p>total :</p>
                  <span class="total_checkout">$</span>
                </div>
                <div class="button_div">
                  <button type="submit">place order</button>
                </div>
              </div>
            </div>
          </div>

          <div class="input_info">
            <div class="address">
              <h2>Delivery Address</h2>
              <div class="inputs">
                <label>Email</label>
                <input type="email" placeholder="enter your Email" />
                <span class="hidden">Invalid Email</span>

                <label>Name</label>
                <input type="text" placeholder="enter your Name" />
                <span class="hidden">Invalid Name</span>

                <label>Address</label>
                <input type="text" placeholder="enter your Address" />
                <span class="hidden">Invalid Address</span>

                <label>Phone</label>
                <input type="number" placeholder="enter your Phone Number" />
                <span class="hidden">Invalid Phone Number</span>
                <span class="hidden" id="form-status">Success!</span>
              </div>
            </div>
          </div>
        </div>
      </form>
    </section>

    <footer id="footer"></footer>

    <script src="../js/main.js"></script>
    <script src="../js/cart.js"></script>
  </body>
</html>
