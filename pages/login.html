<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/light-theme.css" id="theme-link" />
    <link rel="stylesheet" href="../css/index.css">
  </head>
  <body>
  
    <header id="navbar"></header>

    <main class="auth-page">
          <h2>Login</h2>

      <div class="auth-message" id="auth-msg"></div>

        <form class="auth-form" id="login-form" novalidate>
          <div class="field">
            <label for="email">Email address</label>
            <div class="input-wrap">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>

          <div class="field">
            <div class="field-meta">
              <label for="password">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrap">
              
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <button
                type="button"
                class="toggle-password"
                aria-label="Show password"
                data-target="password"
              >
                show
              </button>
            </div>
          </div>

          <button type="submit" class="btn-auth" id="login-btn">Sign In</button>
        </form>

        <div class="auth-divider">
          <span>Don't have an account?</span>
        </div>

        <p class="auth-switch">
          New to MyStore? <a href="signup.html">Create an account →</a>
        </p>
      </div>
    </main>

    
    <footer id="footer"></footer>

    <script src="../js/main.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
