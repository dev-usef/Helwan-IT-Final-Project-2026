<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/light-theme.css" id="theme-link" />
  </head>
  <body>
    <header id="navbar"></header>

    <main class="auth-page">
      <div class="auth-card">

        <h2>Sign Up</h2>

        </div>

        <div class="auth-message" id="auth-msg" role="alert"></div>

        <form class="auth-form" id="signup-form" novalidate>
          <div class="field">
            <label for="name">Full name</label>
            <div class="input-wrap">
              
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Ahmed Ali"
                autocomplete="name"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="email">Email address</label>
            <div class="input-wrap">
              
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                
                required
              />
            </div>
            <span class="field-hint" id="email-hint"></span>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Create a strong password"
                
                required
              />
              <button
                type="button"
                class="toggle-pw"
                aria-label="Show password"
                data-target="password"
              >
                show
              </button>
            </div>

          <div class="field">
            <label for="confirm">Confirm password</label>
            <div class="input-wrap">
              <input
                type="password"
                id="confirm"
                name="confirm"
                placeholder="Repeat your password"
                
                required
              />
              <button
                type="button"
                class="toggle-pw"
                data-target="confirm"
              >
                show
              </button>
            </div>
            <span class="field-hint" id="confirm-hint"></span>
          </div>

          <button type="submit" class="auth-btn" id="signup-btn">
            Create Account
          </button>
        </form>

        <div class="auth-divider">
          <p>already have an account?</p>
        </div>

        <p class="auth-switch">
          <a href="login.html">← Sign in instead</a>
        </p>
      </div>
    </main>

    <footer id="footer"></footer>

    <script src="../js/main.js"></script>
    <script src="../js/signup.js"></script>
  </body>
</html>
